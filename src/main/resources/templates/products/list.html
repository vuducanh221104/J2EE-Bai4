<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h2 {
            color: #333;
            text-align: center;
        }
        .btn-add {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
        }
        .btn-add:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #333;
            color: white;
        }
        .btn {
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 5px;
        }
        .btn-edit {
            background-color: #ff9800;
            color: white;
        }
        .btn-delete {
            background-color: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Danh sách sản phẩm</h2>
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="/products/new" class="btn-add">Thêm sản phẩm</a>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Mã SP</th>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>Danh mục</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.code}">SP001</td>
                    <td style="text-align: center;">
                        <img th:src="@{/uploads/{image}(image=${product.image})}" 
                             width="50" height="50"
                             th:if="${product.image != null}">
                        <span th:if="${product.image == null}">-</span>
                    </td>
                    <td th:text="${product.name}">iPhone 15</td>
                    <td th:text="${product.price} + ' VNĐ'">10000000 VNĐ</td>
                    <td th:text="${product.category}">điện thoại</td>
                    <td>
                        <a th:href="@{/products/edit/{id}(id=${product.id})}" 
                           class="btn btn-edit">Sửa</a>
                        <a th:href="@{/products/delete/{id}(id=${product.id})}" 
                           class="btn btn-delete"
                           onclick="return confirm('Xóa sản phẩm này?')">Xóa</a>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <p th:if="${#lists.isEmpty(products)}" style="text-align: center; color: #666;">
            Chưa có sản phẩm nào.
        </p>
    </div>
</body>
</html>
